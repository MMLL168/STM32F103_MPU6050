[env:bluepill_f103c8]
platform = ststm32
board = bluepill_f103c8
framework = arduino
upload_protocol = stlink
debug_tool = stlink
board_build.core = stm32
board_build.f_cpu = 72000000L
build_type = debug
monitor_port = COM1
monitor_speed = 115200
monitor_filters = direct
debug_init_break = tbreak src/main.cpp:314
upload_flags =
    -c
    set CPUTAPID 0x2ba01477
debug_server =
    ${platformio.packages_dir}/tool-openocd/bin/openocd.exe
    -s
    ${platformio.packages_dir}/tool-openocd/openocd/scripts
    -f
    interface/stlink.cfg
    -c
    transport select hla_swd
    -c
    set CPUTAPID 0x2ba01477
    -f
    target/stm32f1x.cfg
    -c
    reset_config none
debug_build_flags =
    -Og
    -g3
lib_ldf_mode = deep+
build_flags =
    -D BOARD_STM32
    -D LED_PIN=PC13
    -D SERIAL_BAUD=115200
    -D DEBUG_UART_TX=PA9
    -D DEBUG_UART_RX=PA10
    -D ELRS_UART_TX=PB10
    -D ELRS_UART_RX=PB11
    -D MPU6050_I2C_SCL=PB8
    -D MPU6050_I2C_SDA=PB9
    -D PWM_AILERON_PIN=PA0
    -D PWM_ELEVATOR_PIN=PA1
    -D PWM_THROTTLE_PIN=PA2
    -D PWM_RUDDER_PIN=PA3
    -D PWM_AUX_PIN=PA6

; Blue Pill
; - ST-LINK handles upload and single-step debugging
; - USB-TTL on PA9/PA10 is used for serial monitor
; - MPU6050 uses I2C on PB8/PB9
; - PWM outputs default to PA0/PA1/PA2/PA3/PA6
